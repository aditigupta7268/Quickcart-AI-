<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Calculator — QuickCart AI</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='a' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%234f8dff'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23a)'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0B0B0F;
            --bg2: #0f0f15;
            --bg3: #13131c;
            --surface: rgba(255, 255, 255, 0.04);
            --surface2: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.14);
            --text: #f0f0f8;
            --text2: #8b8ba0;
            --text3: #5a5a72;
            --blue: #4f8dff;
            --violet: #7c3aed;
            --neon: #00f5c4;
            --grad: linear-gradient(135deg, #4f8dff 0%, #7c3aed 100%);
            --font: 'Bricolage Grotesque', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            cursor: none;
        }

        .cursor {
            position: fixed;
            width: 12px;
            height: 12px;
            background: var(--neon);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
        }

        .cursor-ring {
            position: fixed;
            width: 36px;
            height: 36px;
            border: 1.5px solid rgba(0, 245, 196, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9997;
            opacity: 0.5;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--violet);
            border-radius: 2px;
        }

        /* ── NAV ──────────────────────────────────────────────────────── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 40px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(11, 11, 15, 0.88);
            backdrop-filter: blur(20px);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-decoration: none;
            color: var(--text);
        }

        .nav-logo-icon {
            width: 32px;
            height: 32px;
            background: var(--grad);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-logo span {
            color: var(--text2);
            font-weight: 400;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-tab {
            padding: 7px 14px;
            border-radius: 9px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text2);
            text-decoration: none;
            transition: all 0.18s;
            border: 1px solid transparent;
        }

        .nav-tab:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-tab.active {
            background: rgba(79, 141, 255, 0.1);
            border-color: rgba(79, 141, 255, 0.25);
            color: var(--blue);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--text2);
            font-weight: 600;
        }

        .nav-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 9px;
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border2);
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-ghost:hover {
            background: var(--surface2);
            color: var(--text);
        }

        /* ── PAGE ──────────────────────────────────────────────────────── */
        .page-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79, 141, 255, 0.06) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0, 245, 196, 0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .page-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 32px 60px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .page-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .page-heading {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        .page-heading .grad {
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-sub {
            font-size: 1rem;
            color: var(--text2);
            margin-top: 10px;
            line-height: 1.6;
        }

        /* ── BILLING APP ──────────────────────────────────────────────── */
        .billing-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
            align-items: start;
            margin-top: 24px;
        }

        @media(max-width: 800px) {
            .billing-grid {
                grid-template-columns: 1fr;
            }
        }

        .b-card {
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .b-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent);
        }

        .b-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .b-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .b-form-row {
            display: flex;
            gap: 12px;
        }

        .b-input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .b-label {
            font-size: 0.8rem;
            color: var(--text2);
            font-weight: 600;
        }

        .b-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            padding: 12px 14px;
            transition: all 0.2s;
            outline: none;
        }

        .b-input:focus {
            border-color: var(--blue);
            background: rgba(79, 141, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(79, 141, 255, 0.1);
        }

        .b-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .b-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
        }

        .b-btn-primary {
            background: var(--blue);
            color: white;
        }

        .b-btn-primary:hover {
            box-shadow: 0 4px 12px rgba(79, 141, 255, 0.3);
            background: #6097ff;
        }

        /* TABLE */
        .b-table-wrap {
            margin-top: 24px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th,
        td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            font-weight: 600;
            color: var(--text2);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-weight: 500;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .td-num {
            font-family: var(--mono);
            text-align: right;
        }

        th.td-num {
            text-align: right;
        }

        .b-action-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .b-action-btn:hover {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text3);
            font-size: 0.9rem;
        }

        /* SUMMARY */
        .b-summary {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            color: var(--text2);
        }

        .summary-row span.val {
            font-family: var(--mono);
            color: var(--text);
            font-weight: 600;
        }

        .summary-total {
            border-top: 1px dashed var(--border2);
            padding-top: 16px;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--neon);
        }

        .summary-total span.val {
            font-family: var(--mono);
        }
    </style>
</head>

<body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <div class="page-bg"></div>

    <!-- NAV -->
    <nav>
        <a href="/index" class="nav-logo">
            <div class="nav-logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <path d="M14 14h3v3h-3zM17 17h3v3h-3zM20 14v3M14 20h3" />
                </svg>
            </div>
            QuickCart <span>AI</span>
        </a>
        <div class="nav-center">
            <a href="/index" class="nav-tab">Home</a>
            <a href="/scanner" class="nav-tab">Scanner</a>
            <a href="/checkout" class="nav-tab">Checkout</a>
            <a href="/payment" class="nav-tab">Payment</a>
            <a href="/receipt" class="nav-tab">Receipt</a>
            <a href="/dashboard" class="nav-tab">Dashboard</a>
            <a href="/billing" class="nav-tab active">Billing</a>
        </div>
        <div class="nav-right">
            <div class="nav-user" id="navUser" style="display: none;">
                <div class="nav-avatar" id="navAvatar">U</div>
                <span id="navName">User</span>
            </div>
            <button class="btn-ghost" onclick="doSignOut()" id="signOutBtn" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sign Out
            </button>
        </div>
    </nav>

    <!-- PAGE MAIN -->
    <main class="page-wrap">
        <header class="page-header">
            <div>
                <h1 class="page-heading">Billing <span class="grad">Calculator</span></h1>
                <p class="page-sub">Quickly calculate totals for manual entries or walk-in customers.</p>
            </div>
        </header>

        <div class="billing-grid">
            <div class="b-card">
                <div class="b-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6v4H2z" />
                        <path d="M10 3h6v4h-6z" />
                        <path d="M18 3h4v4h-4z" />
                        <path d="M2 9h4v4H2z" />
                        <path d="M8 9h4v4H8z" />
                        <path d="M14 9h4v4h-4z" />
                        <path d="M2 15h4v4H2z" />
                        <path d="M8 15h4v4H8z" />
                        <path d="M14 15h4v4h-4z" />
                        <path d="M20 9v10" />
                    </svg>
                    Items List
                </div>

                <form id="billingForm" class="b-form" onsubmit="addItem(event)">
                    <div class="b-form-row" style="flex-wrap: wrap;">
                        <div class="b-input-group" style="min-width: 200px;">
                            <label class="b-label" for="itemName">Item Name</label>
                            <input type="text" id="itemName" class="b-input" placeholder="e.g. Organic Milk" required
                                autocomplete="off">
                        </div>
                        <div class="b-input-group" style="min-width: 100px; flex: 0.5;">
                            <label class="b-label" for="itemPrice">Price (₹)</label>
                            <input type="number" id="itemPrice" class="b-input" min="0" step="0.01" placeholder="0.00"
                                required>
                        </div>
                        <div class="b-input-group" style="min-width: 80px; flex: 0.3;">
                            <label class="b-label" for="itemQty">Qty</label>
                            <input type="number" id="itemQty" class="b-input" min="1" value="1" required>
                        </div>
                        <div class="b-input-group" style="flex: 0 0 100px; justify-content: flex-end;">
                            <button type="submit" class="b-btn b-btn-primary" style="width: 100%;">Add Item</button>
                        </div>
                    </div>
                </form>

                <div class="b-table-wrap">
                    <table id="itemsTable">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th class="td-num">Price</th>
                                <th class="td-num">Qty</th>
                                <th class="td-num">Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody">
                            <tr>
                                <td colspan="5" class="empty-state">No items added yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="b-card">
                <div class="b-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="var(--neon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    Bill Summary
                </div>

                <div class="b-summary">
                    <div class="summary-row">
                        <span>Items Count</span>
                        <span class="val" id="sumCount">0</span>
                    </div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span class="val">₹<span id="sumSubtotal">0.00</span></span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (5%)</span>
                        <span class="val">₹<span id="sumTax">0.00</span></span>
                    </div>
                    <div class="summary-total">
                        <span>Total Due</span>
                        <span class="val">₹<span id="sumTotal">0.00</span></span>
                    </div>
                </div>

                <div style="margin-top: 24px; display: flex; gap: 10px;">
                    <button class="b-btn" style="flex: 1;" onclick="clearBill()">Clear</button>
                    <button class="b-btn b-btn-primary" style="flex: 2;" onclick="generateBill()">Print Bill</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Custom cursor logic
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursorRing');

        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            ring.style.transform = 'translate(-50%, -50%) scale(0.8)';
            ring.style.borderColor = 'var(--neon)';
        });

        document.addEventListener('mouseup', () => {
            ring.style.transform = 'translate(-50%, -50%) scale(1)';
            ring.style.borderColor = 'rgba(0, 245, 196, 0.4)';
        });

        // Authentication guard
        document.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('qc_token');
            const userStr = sessionStorage.getItem('qc_user');

            if (!token || !userStr) {
                // If the user isn't signed in, redirect them to signin
                window.location.href = '/signin';
                return;
            }

            try {
                const user = JSON.parse(userStr);
                document.getElementById('navUser').style.display = 'flex';
                document.getElementById('signOutBtn').style.display = 'flex';
                document.getElementById('navName').textContent = user.name.split(' ')[0];
                document.getElementById('navAvatar').textContent = user.name.charAt(0).toUpperCase();
            } catch (e) {
                console.error("Error parsing user data", e);
                window.location.href = '/signin';
            }
        });

        function doSignOut() {
            sessionStorage.removeItem('qc_token');
            sessionStorage.removeItem('qc_user');
            window.location.href = '/signin';
        }

        // ====== BILLING LOGIC ======
        let billItems = [];

        function renderTable() {
            const tbody = document.getElementById('itemsBody');

            if (billItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No items added yet.</td></tr>';
                updateSummary();
                return;
            }

            let html = '';
            billItems.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td class="td-num">₹${item.price.toFixed(2)}</td>
                        <td class="td-num">${item.qty}</td>
                        <td class="td-num" style="color: var(--neon);">₹${itemTotal.toFixed(2)}</td>
                        <td style="text-align: right;">
                            <button class="b-action-btn" onclick="removeItem(${index})" title="Remove">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            updateSummary();
        }

        function updateSummary() {
            const count = billItems.reduce((acc, item) => acc + item.qty, 0);
            const subtotal = billItems.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const tax = subtotal * 0.05;
            const total = subtotal + tax;

            document.getElementById('sumCount').textContent = count;
            document.getElementById('sumSubtotal').textContent = subtotal.toFixed(2);
            document.getElementById('sumTax').textContent = tax.toFixed(2);
            document.getElementById('sumTotal').textContent = total.toFixed(2);
        }

        function addItem(e) {
            e.preventDefault();

            const nameInput = document.getElementById('itemName');
            const priceInput = document.getElementById('itemPrice');
            const qtyInput = document.getElementById('itemQty');

            const name = nameInput.value.trim();
            const price = parseFloat(priceInput.value);
            const qty = parseInt(qtyInput.value);

            if (name && !isNaN(price) && !isNaN(qty) && qty > 0) {
                billItems.push({ name, price, qty });

                // Reset form
                nameInput.value = '';
                priceInput.value = '';
                qtyInput.value = '1';
                nameInput.focus();

                renderTable();
            }
        }

        function removeItem(index) {
            billItems.splice(index, 1);
            renderTable();
        }

        function clearBill() {
            if (billItems.length === 0) return;
            if (confirm("Are you sure you want to clear the bill?")) {
                billItems = [];
                renderTable();
            }
        }

        function generateBill() {
            if (billItems.length === 0) {
                alert("Please add items to bill first.");
                return;
            }
            alert("Bill generated and sent to printer!");
            billItems = [];
            renderTable();
        }
    </script>
</body>

</html>
