<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — QuickCart AI</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='a' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%234f8dff'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23a)'/><rect x='6' y='6' width='6' height='6' rx='1.2' fill='white'/><rect x='14' y='6' width='2' height='2' rx='.4' fill='white' opacity='.7'/><rect x='6' y='14' width='2' height='2' rx='.4' fill='white' opacity='.7'/><rect x='10' y='14' width='4' height='4' rx='.8' fill='white'/><rect x='20' y='6' width='6' height='6' rx='1.2' fill='white'/><rect x='6' y='20' width='6' height='6' rx='1.2' fill='white'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    :root {
      --bg: #0B0B0F;
      --bg2: #0f0f15;
      --bg3: #13131c;
      --surface: rgba(255, 255, 255, 0.04);
      --surface2: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --text: #f0f0f8;
      --text2: #8b8ba0;
      --text3: #5a5a72;
      --blue: #4f8dff;
      --violet: #7c3aed;
      --indigo: #6366f1;
      --cyan: #06b6d4;
      --neon: #00f5c4;
      --neon2: #7df9ff;
      --grad: linear-gradient(135deg, #4f8dff 0%, #7c3aed 100%);
      --grad2: linear-gradient(135deg, #06b6d4 0%, #6366f1 100%);
      --font: 'Bricolage Grotesque', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
      cursor: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--neon);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease;
      mix-blend-mode: screen;
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(0, 245, 196, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.35s ease;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9997;
      opacity: 0.5;
    }

    ::-webkit-scrollbar {
      width: 3px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--violet);
      border-radius: 2px;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 40px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(11, 11, 15, 0.8);
      backdrop-filter: blur(20px);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--grad);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo span {
      color: var(--text2);
      font-weight: 400;
    }

    /* MAIN LAYOUT */
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      position: relative;
      overflow: hidden;
    }

    .auth-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 30% 50%, rgba(79, 141, 255, 0.07) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 50%, rgba(124, 58, 237, 0.07) 0%, transparent 60%);
    }

    .auth-grid-bg {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 75%);
    }

    .auth-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 32px;
      padding: 48px 44px;
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(79, 141, 255, 0.4), transparent);
      border-radius: 1px;
    }

    .auth-logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-logo-icon {
      width: 56px;
      height: 56px;
      background: var(--grad);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .auth-title {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .auth-sub {
      font-size: 0.9rem;
      color: var(--text2);
    }

    .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* TABS */
    .auth-tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 32px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.01em;
    }

    .auth-tab.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    /* FORM */
    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: fadeUp 0.3s ease both;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text2);
    }

    .form-input-wrap {
      position: relative;
    }

    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(79, 141, 255, 0.1);
    }

    .form-input::placeholder {
      color: var(--text3);
    }

    .form-input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: var(--grad);
      color: #fff;
      border: none;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.01em;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.2s;
    }

    .btn-primary:hover::after {
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(79, 141, 255, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-primary.loading .spinner {
      display: block;
    }

    .btn-primary.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
      color: var(--text3);
      font-size: 0.82rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.85rem;
      color: var(--text2);
    }

    .auth-footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .error-msg {
      display: none;
      color: #ef4444;
      font-size: 0.82rem;
      margin-top: 6px;
      font-weight: 500;
    }

    .error-msg.show {
      display: block;
    }

    .success-msg {
      display: none;
      color: var(--neon);
      font-size: 0.82rem;
      margin-top: 6px;
      font-weight: 500;
    }

    .success-msg.show {
      display: block;
    }

    /* TRUST BADGES */
    .trust-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .trust-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      color: var(--text3);
    }

    .trust-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 6px var(--neon);
    }

    /* FOOTER */
    footer {
      padding: 28px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.82rem;
      color: var(--text3);
    }

    footer a {
      color: var(--text2);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--text);
    }

    @media(max-width:600px) {
      .auth-card {
        padding: 32px 24px;
      }

      .cursor,
      .cursor-ring {
        display: none;
      }

      body {
        cursor: auto;
      }
    }
  </style>
</head>

<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <path d="M14 14h3v3h-3zM17 17h3v3h-3zM20 14v3M14 20h3" />
        </svg>
      </div>
      QuickCart <span>AI</span>
    </a>
  </nav>

  <!-- AUTH MAIN -->
  <main class="auth-wrap">
    <div class="auth-bg"></div>
    <div class="auth-grid-bg"></div>

    <div class="auth-card">
      <div class="auth-logo-area">
        <div class="auth-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <h1 class="auth-title">Welcome to <span class="grad-text">QuickCart AI</span></h1>
        <p class="auth-sub">Sign in to access your smart checkout dashboard</p>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- SIGN IN FORM -->
      <div class="form-section active" id="signinForm">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <div class="form-input-wrap">
            <input class="form-input" type="email" id="siEmail" placeholder="you@store.com" autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="siPassword" placeholder="••••••••"
              autocomplete="current-password">
            <span class="input-icon" onclick="togglePwd('siPassword',this)">👁️</span>
          </div>
        </div>
        <div id="siError" class="error-msg"></div>
        <button class="btn-primary" id="siBtn" onclick="doSignIn()">
          <div class="spinner"></div>
          <span class="btn-text">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            Sign In to Dashboard
          </span>
        </button>
        <div class="auth-footer">Don't have an account? <a href="#" onclick="switchTab('signup');return false;">Create
            one free →</a></div>
      </div>

      <!-- SIGN UP FORM -->
      <div class="form-section" id="signupForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="suName" placeholder="Rahul Sharma" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" id="suEmail" placeholder="you@store.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="suPassword" placeholder="Min. 6 characters"
              autocomplete="new-password">
            <span class="input-icon" onclick="togglePwd('suPassword',this)">👁️</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" id="suConfirm" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div id="suError" class="error-msg"></div>
        <button class="btn-primary" id="suBtn" onclick="doSignUp()">
          <div class="spinner"></div>
          <span class="btn-text">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <line x1="19" y1="8" x2="19" y2="14" />
              <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
            Create Free Account →
          </span>
        </button>
        <div class="auth-footer">Already have an account? <a href="#" onclick="switchTab('signin');return false;">Sign
            in →</a></div>
      </div>

      <!-- TRUST BADGES -->
      <div class="trust-row">
        <span class="trust-badge"><span class="trust-dot"></span>256-bit Encrypted</span>
        <span class="trust-badge"><span class="trust-dot"></span>PCI DSS Compliant</span>
        <span class="trust-badge"><span class="trust-dot"></span>Zero Data Sharing</span>
      </div>
    </div>
  </main>

  <footer>
    © 2025 QuickCart AI &nbsp;·&nbsp; <a href="/">Home</a> &nbsp;·&nbsp; <a href="#">Privacy</a> &nbsp;·&nbsp; <a
      href="#">Terms</a>
  </footer>

  <script>
    const API = 'http://localhost:8000/api';

    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    document.addEventListener('mousemove', e => {
      cursor.style.transform = `translate(${e.clientX - 6}px,${e.clientY - 6}px)`;
      ring.style.transform = `translate(${e.clientX - 18}px,${e.clientY - 18}px)`;
    });

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (tab === 'signin') ? i === 0 : i === 1));
      document.getElementById('signinForm').classList.toggle('active', tab === 'signin');
      document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    }

    function togglePwd(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearError(id) { document.getElementById(id).classList.remove('show'); }

    async function doSignIn() {
      clearError('siError');
      const email = document.getElementById('siEmail').value.trim();
      const password = document.getElementById('siPassword').value;
      if (!email || !password) { showError('siError', 'Please fill in all fields.'); return; }

      setLoading('siBtn', true);
      try {
        const res = await fetch(`${API}/auth/signin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Sign in failed');
        sessionStorage.setItem('qc_token', data.token);
        sessionStorage.setItem('qc_user', JSON.stringify({ id: data.user_id, name: data.name, email: data.email }));
        window.location.href = '/dashboard';
      } catch (e) {
        showError('siError', e.message);
      } finally {
        setLoading('siBtn', false);
      }
    }

    async function doSignUp() {
      clearError('suError');
      const name = document.getElementById('suName').value.trim();
      const email = document.getElementById('suEmail').value.trim();
      const password = document.getElementById('suPassword').value;
      const confirm = document.getElementById('suConfirm').value;
      if (!name || !email || !password) { showError('suError', 'Please fill in all fields.'); return; }
      if (password !== confirm) { showError('suError', 'Passwords do not match.'); return; }
      if (password.length < 6) { showError('suError', 'Password must be at least 6 characters.'); return; }

      setLoading('suBtn', true);
      try {
        const res = await fetch(`${API}/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Sign up failed');
        sessionStorage.setItem('qc_token', data.token);
        sessionStorage.setItem('qc_user', JSON.stringify({ id: data.user_id, name: data.name, email: data.email }));
        window.location.href = '/dashboard';
      } catch (e) {
        showError('suError', e.message);
      } finally {
        setLoading('suBtn', false);
      }
    }

    // Allow Enter key submission
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const si = document.getElementById('signinForm');
      if (si.classList.contains('active')) doSignIn();
      else doSignUp();
    });
  </script>
</body>

</html>
